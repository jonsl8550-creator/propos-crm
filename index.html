<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover"/>
<!-- PWA -->
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="PropOS"/>
<meta name="theme-color" content="#c9973a"/>
<meta name="description" content="Sistema Operativo Inmobiliario"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<link rel="icon" type="image/png" href="/icon-192.png"/>
<title>PropOS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body,#root{height:100%;width:100%;overflow:hidden;background:#060d18;}
body{overscroll-behavior:none;-webkit-text-size-adjust:100%;}
#splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:#060d18;z-index:9999;gap:14px;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
#splash .logo{font-size:52px;color:#c9973a;}
#splash .name{font-size:22px;color:#c9973a;letter-spacing:2px;font-weight:300;}
#splash .sub{font-size:12px;color:#3a5070;margin-top:4px;}
#splash .bar{width:120px;height:3px;background:#0f1e32;border-radius:3px;overflow:hidden;}
#splash .fill{height:100%;background:linear-gradient(90deg,#c9973a88,#c9973a);
  border-radius:3px;animation:load 1.5s ease forwards;}
@keyframes load{from{width:0}to{width:100%}}
</style>
</head>
<body>
<div id="splash">
  <div class="logo">⬡</div>
  <div class="name">PropOS</div>
  <div class="sub">CRM Inmobiliario</div>
  <div class="bar"><div class="fill"></div></div>
</div>
<div id="root"></div>
<script src="/bundle.js"></script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
</script>
</body>
</html>
